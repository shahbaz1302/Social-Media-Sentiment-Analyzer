<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Social Media Sentiment Analyzer</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap");

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Poppins", sans-serif;
      color: #eef0ff;
      overflow-y: auto;
      background: #0f1226;
    }

    canvas#bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(20, 20, 40, 0.6);
      border-radius: 20px;
      max-width: 900px;
      width: 92%;
      padding: 40px 50px;
      margin: 60px auto;
      display: flex;
      flex-direction: column;
      gap: 25px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow:
        0 0 20px rgba(80, 109, 255, 0.2),
        inset 0 0 20px rgba(255, 255, 255, 0.05);
    }

    h1 {
      font-weight: 700;
      font-size: 2.3rem;
      text-align: center;
      color: #b3c7ff;
      margin: 0;
      text-shadow: 0 0 10px #506dff;
    }

    .input-section {
      display: flex;
      flex-direction: column;
      gap: 30px;
      margin-bottom: 30px;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      padding: 20px;
      border-radius: 16px;
      border: none;
      font-size: 1.1rem;
      background: rgba(30, 30, 50, 0.7);
      color: #eef0ff;
      resize: vertical;
      box-shadow: inset 0 0 15px rgba(80, 109, 255, 0.5);
    }

    textarea:focus {
      outline: none;
      box-shadow: inset 0 0 20px #759eff;
      background: rgba(25, 25, 45, 0.9);
    }

    button {
      background: #667cff;
      color: white;
      border: none;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 14px;
      cursor: pointer;
      border-radius: 14px;
      transition:
        background 0.3s ease,
        box-shadow 0.3s ease;
      box-shadow: 0 8px 20px rgba(102, 124, 255, 0.7);
    }

    button:hover {
      background: #5872d5;
      box-shadow: 0 12px 30px rgba(80, 109, 255, 0.85);
      animation: pulse 0.5s;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.08);
      }

      100% {
        transform: scale(1);
      }
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      justify-content: center;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
    }

    .file-input-wrapper input[type=file] {
      position: absolute;
      left: -9999px;
    }

    #results {
      margin-top: 30px;
    }

    .result-item {
      background: rgba(40, 40, 60, 0.8);
      padding: 20px;
      margin: 15px 0;
      border-radius: 16px;
      border-left: 4px solid #667cff;
      animation: fadeInUp 0.5s ease;
    }

    .sentiment-label {
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.95rem;
    }

    .sentiment-label.positive {
      background: rgba(76, 175, 80, 0.2);
      color: #4CAF50;
      border: 1px solid #4CAF50;
    }

    .sentiment-label.negative {
      background: rgba(244, 67, 54, 0.2);
      color: #F44336;
      border: 1px solid #F44336;
    }

    .sentiment-label.neutral {
      background: rgba(255, 193, 7, 0.2);
      color: #FFC107;
      border: 1px solid #FFC107;
    }

    .chart-container {
      margin: 30px 0;
      background: rgba(30, 30, 50, 0.8);
      border-radius: 16px;
      padding: 20px;
      height: 400px;
    }

    .summary-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }

    .stat-card {
      background: rgba(102, 124, 255, 0.15);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(102, 124, 255, 0.3);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: #667cff;
    }

    .stat-dominant {
      background: linear-gradient(45deg, #4CAF50, #81C784) !important;
      color: white !important;
      border-color: #4CAF50 !important;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .spinner {
      border: 4px solid rgba(102, 124, 255, 0.3);
      border-top: 4px solid #667cff;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #backToTop {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 50px;
      height: 50px;
      background: linear-gradient(45deg, #667cff, #759eff);
      border-radius: 50%;
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
    }

    #backToTop.show {
      opacity: 1;
      transform: scale(1);
    }

    @media (max-width: 768px) {
      .container {
        margin: 20px;
        padding: 25px;
        width: 95%;
      }

      h1 {
        font-size: 2rem;
      }

      .button-group {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        padding: 16px;
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body>
  <canvas id="bgCanvas"></canvas>

  <div class="container animate__animated animate__fadeIn">
    <h1 class="animate__animated animate__fadeInDown">Social Media Sentiment Analyzer</h1>
    <p style="text-align: center; color: #b0bbf9cc; margin: 0 0 30px 0;">
      Analyze social media posts, reviews, or any text with AI-powered sentiment detection
    </p>

    <div class="input-section">
      <textarea id="textInput"
        placeholder="Paste your social media posts, reviews, or tweets here...&#10;&#10;Examples:&#10;• 'Amazing product, love it!'&#10;• 'Worst experience ever, very disappointed'&#10;• 'Service was okay, nothing special'" rows="7"></textarea>

      <div class="button-group">
        <button id="analyzeBtn" onclick="analyzeSentiments()">Analyze Sentiment</button>
        <input type="file" id="fileInput" accept=".txt,.csv,.xlsx" style="display: none;"
          onchange="handleFileUpload(event)">
        <button onclick="document.getElementById('fileInput').click()" type="button">
          Upload File (CSV/TXT)
        </button>
        <button id="exportBtn" onclick="exportResults()" disabled>Export CSV</button>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Analyzing sentiments... This may take a few moments</p>
    </div>

    <div id="results"></div>
    <div id="chartSection" class="chart-container" style="display: none;">
      <canvas id="sentimentChart"></canvas>
    </div>

    <div class="summary-stats" id="summaryStats" style="display: none;"></div>
  </div>

  <button id="backToTop" onclick="scrollToTop()" title="Back to top">↑</button>

  <script>
    // Animated Background
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    for (let i = 0; i < 100; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        radius: Math.random() * 2 + 1
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(102, 124, 255, ${p.radius / 3})`;
        ctx.fill();
      });
      requestAnimationFrame(animate);
    }
    animate();

    let chartInstance = null;
    let currentResults = [];

    async function analyzeSentiments() {
      const textInput = document.getElementById('textInput').value.trim();
      if (!textInput) {
        alert('Please enter some text to analyze!');
        return;
      }

      const loading = document.getElementById('loading');
      const analyzeBtn = document.getElementById('analyzeBtn');
      const resultsDiv = document.getElementById('results');

      loading.style.display = 'block';
      analyzeBtn.disabled = true;
      analyzeBtn.textContent = 'Analyzing...';
      resultsDiv.innerHTML = '';

      try {
        const texts = textInput.split('\n').filter(t => t.trim()).slice(0, 20);
        const response = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ texts })
        });

        const data = await response.json();
        currentResults = data.results;

        displayResults(data.results, data.summary);
        await loadChart(data.summary);

      } catch (error) {
        resultsDiv.innerHTML = '<div style="text-align:center;padding:40px;color:#ff6b6b;">Failed to connect to server. Please try again.</div>';
      } finally {
        loading.style.display = 'none';
        analyzeBtn.disabled = false;
        analyzeBtn.textContent = '🔍 Analyze Sentiment';
      }
    }

    async function handleFileUpload() {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      if (!file) return;

      const loading = document.getElementById('loading');
      const resultsDiv = document.getElementById('results');

      loading.style.display = 'block';
      resultsDiv.innerHTML = '';

      const formData = new FormData();
      formData.append('file', file);

      try {
        const response = await fetch('/analyze_file', {
          method: 'POST',
          body: formData
        });
        const data = await response.json();
        currentResults = data.results;

        displayResults(data.results, data.summary);
        await loadChart(data.summary);

      } catch (error) {
        resultsDiv.innerHTML = '<div style="text-align:center;padding:40px;color:#ff6b6b;">File upload failed. Please try again.</div>';
      } finally {
        loading.style.display = 'none';
      }
    }

    function displayResults(results, summary) {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';

      results.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = `result-item animate__animated animate__fadeInUp`;
        div.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <p class="text-content" style="margin:0;flex:1;padding-right:15px;">${item.text}</p>
              <span class="sentiment-label ${item.sentiment.toLowerCase()}">
                ${item.sentiment}<br><small>Score: ${item.score}</small>
              </span>
            </div>
          `;
        resultsDiv.appendChild(div);
      });

      displaySummary(summary);
      document.getElementById('exportBtn').disabled = false;
      document.getElementById('chartSection').style.display = 'block';
    }

    function displaySummary(summary) {
      const statsDiv = document.getElementById('summaryStats');
      statsDiv.style.display = 'grid';
      statsDiv.innerHTML = `
          <div class="stat-card">
            <div class="stat-number">${summary.positive}%</div>
            <div>Positive</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">${summary.negative}%</div>
            <div>Negative</div>
          </div>
          <div class="stat-card">
            <div class="stat-number">${summary.neutral}%</div>
            <div>Neutral</div>
          </div>
          <div class="stat-card stat-dominant">
            <div class="stat-number">${summary.dominant}</div>
            <div>Dominant</div>
          </div>
        `;
    }

    async function loadChart(summary) {
      const ctx = document.getElementById('sentimentChart').getContext('2d');

      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Positive', 'Negative', 'Neutral'],
          datasets: [{
            data: [summary.positive, summary.negative, summary.neutral],
            backgroundColor: ['#4CAF50', '#F44336', '#FFC107'],
            borderWidth: 0,
            borderRadius: 10
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { padding: 20, font: { size: 14 } } },
            tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.parsed}%` } }
          }
        }
      });
    }

    async function exportResults() {
      if (currentResults.length === 0) {
        alert('No results to export!');
        return;
      }

      const response = await fetch('/export_csv', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ results: currentResults })
      });

      const blob = await response.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `sentiment_results_${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);
    }

    // Enter key support
    document.getElementById('textInput').addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') analyzeSentiments();
    });

    // Smooth scroll
    window.onscroll = () => {
      document.getElementById('backToTop').classList.toggle('show', window.scrollY > 300);
    };

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Auto-resize textarea
    document.getElementById('textInput').addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });
  </script>
</body>

</html>
